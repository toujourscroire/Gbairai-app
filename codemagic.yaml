workflows:
  ios-testflight:
    name: iOS — TestFlight
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - gbairai_secrets
      vars:
        BUNDLE_ID: ci.gbairai.app

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      # 1. Environnement
      - name: Print environment
        script: |
          echo "Flutter: $(flutter --version)"
          echo "Xcode: $(xcodebuild -version)"
          echo "CocoaPods: $(pod --version)"

      # 2. Dépendances Flutter
      - name: Flutter pub get
        script: flutter pub get

      # 3. Génération code Freezed / json_serializable
      - name: Build runner
        script: |
          flutter pub run build_runner build --delete-conflicting-outputs

      # 4. Analyse statique
      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos --no-fatal-warnings

      # 5. Tests (non bloquants)
      - name: Flutter test
        script: flutter test
        ignore_failure: true

      # 6. Génération projet iOS + ajout GoogleService-Info.plist au bundle + pod install
      - name: Generate iOS & Pod install
        script: |
          flutter create --platforms=ios . --project-name app --org ci.gbairai
          git checkout HEAD -- ios/Runner/

          # Ré-injecter la plist APRÈS git checkout (le checkout ne la touche pas car
          # elle est gitignorée, mais on s'assure qu'elle est là avant le build Xcode)
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > ios/Runner/GoogleService-Info.plist

          sed -i "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = $APPLE_TEAM_ID;/g" \
            ios/Runner.xcodeproj/project.pbxproj

          # ── CRITIQUE : injecter GoogleService-Info.plist dans project.pbxproj ──
          # xcodeproj gem reformate tout le fichier → SWBUtil.PropertyListConversionError.
          # On utilise Python pour une chirurgie minimale (4 insertions, format intact).
          python3 - <<'PYEOF'
import re, secrets, sys

pbxproj = 'ios/Runner.xcodeproj/project.pbxproj'
with open(pbxproj, 'r', encoding='utf-8') as f:
    content = f.read()

if 'GoogleService-Info.plist' in content:
    print('[pbxproj] GoogleService-Info.plist déjà présent — skip')
    sys.exit(0)

# Générer deux UUIDs au format pbxproj (24 hex majuscules)
def new_uuid():
    return secrets.token_hex(12).upper()

file_ref_id  = new_uuid()  # PBXFileReference
build_file_id = new_uuid() # PBXBuildFile

# 1. Ajouter PBXBuildFile
build_file_entry = (
    f'\t\t{build_file_id} /* GoogleService-Info.plist in Resources */ = '
    f'{{isa = PBXBuildFile; fileRef = {file_ref_id} /* GoogleService-Info.plist */; }};\n'
)
content = content.replace(
    '/* Begin PBXBuildFile section */',
    '/* Begin PBXBuildFile section */\n' + build_file_entry, 1
)

# 2. Ajouter PBXFileReference
file_ref_entry = (
    f'\t\t{file_ref_id} /* GoogleService-Info.plist */ = '
    f'{{isa = PBXFileReference; fileEncoding = 4; lastKnownFileType = text.plist.xml; '
    f'name = "GoogleService-Info.plist"; path = "GoogleService-Info.plist"; '
    f'sourceTree = "<group>"; }};\n'
)
content = content.replace(
    '/* Begin PBXFileReference section */',
    '/* Begin PBXFileReference section */\n' + file_ref_entry, 1
)

# 3. Ajouter dans le groupe Runner (après AppDelegate.swift)
content = re.sub(
    r'(AppDelegate\.swift \*/,)',
    r'\1\n\t\t\t\t' + file_ref_id + r' /* GoogleService-Info.plist */,',
    content, count=1
)

# 4. Ajouter dans la phase Copy Bundle Resources (après Assets.xcassets)
content = re.sub(
    r'(Assets\.xcassets in Resources \*/,)',
    r'\1\n\t\t\t\t' + build_file_id + r' /* GoogleService-Info.plist in Resources */,',
    content, count=1
)

with open(pbxproj, 'w', encoding='utf-8') as f:
    f.write(content)

print(f'[pbxproj] GoogleService-Info.plist injecté ✓')
print(f'  PBXFileReference : {file_ref_id}')
print(f'  PBXBuildFile     : {build_file_id}')
PYEOF

          cd ios && pod install --repo-update

      # 7. Signing — certificat + profil créés automatiquement via ASC API
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY
          keychain add-certificates
          xcode-project use-profiles

      # 8. Build IPA signé
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=SENTRY_DSN=$SENTRY_DSN \
            --dart-define=POSTHOG_API_KEY=$POSTHOG_KEY \
            --dart-define=POSTHOG_HOST=$POSTHOG_HOST \
            --dart-define=OPENAI_KEY=$OPENAI_KEY \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - dev@gbairai.ci
        notify:
          success: true
          failure: true

  # Workflow développement — simulateur, pas de signing
  ios-dev:
    name: iOS — Dev Build
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - gbairai_secrets

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
        - pattern: 'feature/*'
          include: true

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Build runner
        script: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Flutter test
        script: flutter test
        ignore_failure: true

      - name: Generate iOS & Pod install
        script: |
          flutter create --platforms=ios . --project-name app --org ci.gbairai
          git checkout HEAD -- ios/Runner/
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > ios/Runner/GoogleService-Info.plist

          python3 - <<'PYEOF'
import re, secrets, sys
pbxproj = 'ios/Runner.xcodeproj/project.pbxproj'
with open(pbxproj, 'r') as f:
    content = f.read()
if 'GoogleService-Info.plist' in content:
    print('Already present'); sys.exit(0)
def uid(): return secrets.token_hex(12).upper()
fr, bf = uid(), uid()
content = content.replace('/* Begin PBXBuildFile section */',
    '/* Begin PBXBuildFile section */\n\t\t' + bf +
    ' /* GoogleService-Info.plist in Resources */ = {isa = PBXBuildFile; fileRef = ' + fr + ' /* GoogleService-Info.plist */; };\n', 1)
content = content.replace('/* Begin PBXFileReference section */',
    '/* Begin PBXFileReference section */\n\t\t' + fr +
    ' /* GoogleService-Info.plist */ = {isa = PBXFileReference; fileEncoding = 4; lastKnownFileType = text.plist.xml; name = "GoogleService-Info.plist"; path = "GoogleService-Info.plist"; sourceTree = "<group>"; };\n', 1)
content = re.sub(r'(AppDelegate\.swift \*/,)', r'\1\n\t\t\t\t' + fr + ' /* GoogleService-Info.plist */,', content, 1)
content = re.sub(r'(Assets\.xcassets in Resources \*/,)', r'\1\n\t\t\t\t' + bf + ' /* GoogleService-Info.plist in Resources */,', content, 1)
with open(pbxproj, 'w') as f: f.write(content)
print('GoogleService-Info.plist injected OK')
PYEOF

          cd ios && pod install

      - name: Flutter build iOS simulator
        script: |
          flutter build ios --debug --simulator \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=POSTHOG_API_KEY=$POSTHOG_KEY \
            --dart-define=POSTHOG_HOST=$POSTHOG_HOST

    artifacts:
      - build/ios/iphonesimulator/Runner.app
