workflows:
  ios-testflight:
    name: iOS — TestFlight
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - gbairai_secrets
      vars:
        BUNDLE_ID: ci.gbairai.app
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ci.gbairai.app

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      # 0. Injecter GoogleService-Info.plist depuis le secret base64
      - name: Inject GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > ios/Runner/GoogleService-Info.plist

      # 1. Environnement
      - name: Print environment
        script: |
          echo "Flutter: $(flutter --version)"
          echo "Xcode: $(xcodebuild -version)"
          echo "CocoaPods: $(pod --version)"

      # 2. Dépendances Flutter
      - name: Flutter pub get
        script: flutter pub get

      # 3. Génération code Freezed / json_serializable
      - name: Build runner
        script: |
          flutter pub run build_runner build --delete-conflicting-outputs

      # 4. Analyse statique
      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos --no-fatal-warnings

      # 5. Tests (non bloquants)
      - name: Flutter test
        script: flutter test
        ignore_failure: true

      # 6. Génération projet iOS + injection signing + pod install
      - name: Generate iOS & Pod install
        script: |
          # Génère xcodeproj, Podfile, Flutter/xcconfigs (manquants car pas de flutter create initial)
          # --project-name app --org ci.gbairai → bundle ID ci.gbairai.app
          flutter create --platforms=ios . --project-name app --org ci.gbairai
          # Restaurer nos fichiers iOS custom
          git checkout HEAD -- ios/Runner/
          # Codemagic injecte automatiquement le DEVELOPMENT_TEAM via xcode-project use-profiles
          # On l'applique aussi dans le pbxproj pour éviter toute erreur de signing précoce
          sed -i "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = $APPLE_TEAM_ID;/g" \
            ios/Runner.xcodeproj/project.pbxproj
          # Appliquer les profils de provisioning Codemagic
          xcode-project use-profiles
          # Installer les pods
          cd ios && pod install --repo-update

      # 7. Build IPA signé + export (tout en un)
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=SENTRY_DSN=$SENTRY_DSN \
            --dart-define=POSTHOG_API_KEY=$POSTHOG_KEY \
            --dart-define=POSTHOG_HOST=$POSTHOG_HOST \
            --dart-define=OPENAI_KEY=$OPENAI_KEY \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
      email:
        recipients:
          - dev@gbairai.ci
        notify:
          success: true
          failure: true

  # Workflow développement — simulateur, pas de signing
  ios-dev:
    name: iOS — Dev Build
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - gbairai_secrets

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
        - pattern: 'feature/*'
          include: true

    scripts:
      - name: Inject GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Flutter pub get
        script: flutter pub get

      - name: Build runner
        script: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Flutter test
        script: flutter test
        ignore_failure: true

      - name: Generate iOS & Pod install
        script: |
          flutter create --platforms=ios . --project-name app --org ci.gbairai
          git checkout HEAD -- ios/Runner/
          cd ios && pod install

      # Build simulateur — aucun signing requis
      - name: Flutter build iOS simulator
        script: |
          flutter build ios --debug --simulator \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=POSTHOG_API_KEY=$POSTHOG_KEY \
            --dart-define=POSTHOG_HOST=$POSTHOG_HOST

    artifacts:
      - build/ios/iphonesimulator/Runner.app
