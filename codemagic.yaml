workflows:
  ios-testflight:
    name: iOS — TestFlight
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - gbairai_secrets
      vars:
        BUNDLE_ID: ci.gbairai.app

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      # 1. Environnement
      - name: Print environment
        script: |
          echo "Flutter: $(flutter --version)"
          echo "Xcode: $(xcodebuild -version)"
          echo "CocoaPods: $(pod --version)"

      # 2. Dépendances Flutter
      - name: Flutter pub get
        script: flutter pub get

      # 3. Génération code Freezed / json_serializable
      - name: Build runner
        script: |
          flutter pub run build_runner build --delete-conflicting-outputs

      # 4. Analyse statique
      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos --no-fatal-warnings

      # 5. Tests (non bloquants)
      - name: Flutter test
        script: flutter test
        ignore_failure: true

      # 6. Génération projet iOS + ajout GoogleService-Info.plist au bundle + pod install
      - name: Generate iOS & Pod install
        script: |
          flutter create --platforms=ios . --project-name app --org ci.gbairai
          git checkout HEAD -- ios/Runner/

          # GoogleService-Info.plist : PAS injectée dans project.pbxproj
          # Firebase est configuré via dart-define FirebaseOptions (voir Build IPA).
          # Ajouter la plist à Copy Bundle Resources sur Xcode 16+ cause
          # SWBUtil.PropertyListConversionError error 2 → archive failure.

          sed -i "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = $APPLE_TEAM_ID;/g" \
            ios/Runner.xcodeproj/project.pbxproj

          cd ios && pod install --repo-update

      # 7. Signing — certificat + profil créés automatiquement via ASC API
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY
          keychain add-certificates
          xcode-project use-profiles

      # 8. Build IPA signé
      - name: Build IPA
        script: |
          # ── Extraire les valeurs Firebase depuis GOOGLE_SERVICE_INFO_PLIST ──────
          # PlistBuddy écrit "Error Reading File" sur stdout (pas stderr) → valeur
          # corrompue avec newline → flutter build échoue. On utilise Python plistlib
          # qui gère le base64 decode + XML parse de façon fiable.
          eval $(python3 scripts/extract_firebase.py "$GOOGLE_SERVICE_INFO_PLIST")
          echo "[Firebase] APP_ID=${FIREBASE_APP_ID:0:12}... PROJECT=$FIREBASE_PROJECT_ID"

          flutter build ipa --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=SENTRY_DSN=$SENTRY_DSN \
            --dart-define=POSTHOG_API_KEY=$POSTHOG_KEY \
            --dart-define=POSTHOG_HOST=$POSTHOG_HOST \
            --dart-define=OPENAI_KEY=$OPENAI_KEY \
            --dart-define=FIREBASE_API_KEY="$FIREBASE_API_KEY" \
            --dart-define=FIREBASE_APP_ID="$FIREBASE_APP_ID" \
            --dart-define=FIREBASE_SENDER_ID="$FIREBASE_SENDER_ID" \
            --dart-define=FIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID" \
            --dart-define=FIREBASE_STORAGE_BUCKET="$FIREBASE_STORAGE_BUCKET" \
            --dart-define=FIREBASE_IOS_BUNDLE_ID="$FIREBASE_IOS_BUNDLE_ID" \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - dev@gbairai.ci
        notify:
          success: true
          failure: true

  # Workflow développement — simulateur, pas de signing
  ios-dev:
    name: iOS — Dev Build
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - gbairai_secrets

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
        - pattern: 'feature/*'
          include: true

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Build runner
        script: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Flutter test
        script: flutter test
        ignore_failure: true

      - name: Generate iOS & Pod install
        script: |
          flutter create --platforms=ios . --project-name app --org ci.gbairai
          git checkout HEAD -- ios/Runner/
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > ios/Runner/GoogleService-Info.plist
          python3 scripts/inject_google_plist.py
          cd ios && pod install

      - name: Flutter build iOS simulator
        script: |
          flutter build ios --debug --simulator \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=POSTHOG_API_KEY=$POSTHOG_KEY \
            --dart-define=POSTHOG_HOST=$POSTHOG_HOST

    artifacts:
      - build/ios/iphonesimulator/Runner.app
