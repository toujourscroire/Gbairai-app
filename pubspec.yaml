name: gbairai
description: Le Radar Social Ivoirien — Plateforme de contenu buzz premium
publish_to: none
version: 1.0.0+3

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ─────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Routing ──────────────────────────────────────────────────────
  go_router: ^14.2.7

  # ── Backend / Auth ───────────────────────────────────────────────
  supabase_flutter: ^2.5.6

  # ── Code Generation ──────────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ── Firebase ─────────────────────────────────────────────────────
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # ── Social Auth ──────────────────────────────────────────────────
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1

  # ── Media ────────────────────────────────────────────────────────
  camera: ^0.11.0+1
  image_picker: ^1.1.2
  video_player: ^2.9.1
  just_audio: ^0.9.39
  # record: removed — not used in code, causes record_linux compilation error

  # ── UI & Animations ──────────────────────────────────────────────
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

  # ── Local Storage (sécurisé) ─────────────────────────────────────
  shared_preferences: ^2.3.1
  flutter_secure_storage: ^9.2.2

  # ── Connectivity ─────────────────────────────────────────────────
  connectivity_plus: ^6.0.3

  # ── Biometrics ───────────────────────────────────────────────────
  local_auth: ^2.3.0

  # ── Security ─────────────────────────────────────────────────────
  crypto: ^3.0.3
  encrypt: ^5.0.3
  uuid: ^4.4.2

  # ── Permissions ──────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── Analytics ────────────────────────────────────────────────────
  posthog_flutter: ^4.0.1

  # ── Utils ────────────────────────────────────────────────────────
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  path_provider: ^2.1.4
  intl: ^0.19.0
  logger: ^2.4.0
  package_info_plus: ^8.0.2
  device_info_plus: ^10.1.2
  collection: ^1.18.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3
  mockito: ^5.4.4
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/sounds/
